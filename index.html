    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #2b1055 0%, #000000 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #f8a5c2, #786fa6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.9rem;
            color: #b2bec3;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        input:focus {
            border-color: #786fa6;
            box-shadow: 0 0 15px rgba(120, 111, 166, 0.5);
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #e15f41, #c44569);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(225, 95, 65, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(225, 95, 65, 0.6);
        }

        #loading {
            display: none;
            margin-top: 25px;
            font-style: italic;
            color: #f8a5c2;
            animation: pulse 1s infinite;
        }

        #resultArea {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            animation: fadeIn 0.5s;
        }

        .khodam-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f1c40f;
            margin: 10px 0;
            text-transform: capitalize;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

        function mulaiCek() {
            const inputNama = document.getElementById('namaInput').value;
            
            if(inputNama.trim() === '') {
                alert('Namanya diisi dulu dong, masa ghoib!');
                return;
            }

            // Sembunyikan hasil lama & tampilkan loading
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // Efek loading 2 detik biar deg-degan
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                
                // Pilih khodam acak dari 200 daftar di atas
                const randomIndex = Math.floor(Math.random() * daftarKhodam.length);
                const khodamTerpilih = daftarKhodam[randomIndex];

                // Tampilkan hasil
                document.getElementById('namaUser').innerText = inputNama;
                document.getElementById('hasilKhodam').innerText = khodamTerpilih.nama;
                document.getElementById('deskripsiKhodam').innerText = khodamTerpilih.desc;
                
                document.getElementById('resultArea').style.display = 'block';
            }, 2000);
        }
    </script>
